<!DOCTYPE html>
<html>
  <head>
    <title>Chatbot</title>
    <style>
      body {
        margin: 0;
        font-family: Arial;
      }

      .chat-input {
        padding: 12px 15px;
        font-size: 15px;
        border-radius: 10px;
        border-width: 1px;
        margin-right: 10px;
        flex-grow: 1;
      }

      .send-btn {
        background-color: rgb(25, 135, 84);
        color: white;
        padding: 10px 20px;
        font-size: 15px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
      }

      .chat-input-container {
        display: flex;
        margin-bottom: 60px;
      }

      .chat-message-text {
        background-color: rgb(238, 238, 238);
        margin-right: 10px;
        margin-left: 10px;
        border-radius: 10px;
        padding: 15px 20px;
        max-width: 300px;
      }

      .chat-message-robot,
      .chat-message-user {
        display: flex;
        align-items: start;
        margin-bottom: 20px;
      }

      .chat-message-robot img,
      .chat-message-user img {
        width: 45px;
      }

      .chat-message-user {
        justify-content: end;
      }

      .chat-message-robot {
        justify-content: start;
      }

      .chat-message-container {
        flex-grow: 1;
        margin-top: 20px;
        margin-bottom: 60px;
        overflow: scroll;
        scrollbar-width: none;
      }

      .welcome-p {
        text-align: center;
        color: gray;
      }

      .loading {
        width: 40px;
        margin: -15px;
      }

      .app-container {
        max-width: 600px;
        display: flex;
        flex-direction: column;
        height: 100vh;
        margin-right: auto;
        margin-left: auto;
      }
    </style>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev@8.6.4/dayjs.js"></script>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/chatbot.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">
      function ChatInput({chatMessages, setChatMessages}) {
        const [inputText, setInputText] = React.useState('');
        const [isLoading, setIsLoading] = React.useState(false);

        function saveInputText(event) {
          setInputText(event.target.value);
        }

        async function sendMessage() {
          if(isLoading || inputText === '') {
            return;
          }

          setIsLoading(true);

          const newChatMessages = ([
            ...chatMessages,
            {
              message: inputText,
              sender: 'user',
              id: crypto.randomUUID()
            }
          ]);

          setChatMessages(newChatMessages);

          setInputText('');
          setChatMessages([
            ...newChatMessages,
            {
              message: <img className="loading" src="img/loading-spinner.gif" />,
              sender: 'robot',
              id: crypto.randomUUID()
            }
          ]);


          const response = await Chatbot.getResponseAsync(inputText);
          setChatMessages([
            ...newChatMessages,
            {
              message: response,
              sender: 'robot',
              id: crypto.randomUUID()
            }
          ]);
          setIsLoading(false);
        }

        function keyDown(event) {
          if(event.key === 'Enter') {
            sendMessage();
          } else if(event.key === 'Escape') {
            setInputText('');
          }
        }

        return (
          <div className="chat-input-container">
            <input 
              placeholder="Send a message to Chatbot" 
              size="30"
              onChange={saveInputText} 
              value={inputText}
              onKeyDown={keyDown}
              className="chat-input"
            /> 
            <button
              onClick={sendMessage}
              className="send-btn"
            >Send</button>
          </div>
        ); // '<> </>' é um fragmento. Permite com que retorne um elemento da função sem criar uma div extra
      }

      function ChatMessage({message, sender}) {
        //const message = props.message;
        //const sender = props.sender;
        //const {message} = props;
        //const {sender} = props;

        return (
          <div className={sender === 'user' ? 'chat-message-user' : 'chat-message-robot'}>
            {sender === 'robot' && (
              <img src="img/robot.png" width="50" />
            )}
            <div className="chat-message-text">
              {message}
            </div>
            {sender === 'user' && (
              <img src="img/user.png" width="50" />
            )}
          </div>
        );
      }

      function ChatMessages({chatMessages}) { 
        const chatMessagesRef = React.useRef(null);

        React.useEffect(() => {
          const containerElem = chatMessagesRef.current;
          if (containerElem) {
            containerElem.scrollTop = containerElem.scrollHeight;
          }
        }, [chatMessages]);

        return (
          <div className="chat-message-container" ref={chatMessagesRef}>
            {chatMessages.map(chatMessage => {
              return(
                <ChatMessage 
                  message={chatMessage.message}
                  sender={chatMessage.sender}
                  key={chatMessage.id}
                />
              );
            })}
          </div>
        );
      }

      function App() {
        const [chatMessages, setChatMessages] = React.useState([]);
        // const [chatMessages, setChatMessages] = array;
        // const chatMessages = array[0]; Primeiro elemento do array de useState são os dados atuais salvos
        // const setChatMessages = array[1]; O segundo elemento é uma função que atualiza os dados juntamente com o HTML (sempre colocar set no começo do nome)
        
        return (
        <div className="app-container">
          {chatMessages.length === 0 && (
            <p className="welcome-p">Welcome to the chatbot project! Send a message using the textbox below.</p>
          )}
          <ChatMessages
            chatMessages={chatMessages}
          /> 
          <ChatInput
            chatMessages={chatMessages}
            setChatMessages={setChatMessages}
          />
        </div>
        );
      }

      const container = document.querySelector('.js-container');
      ReactDOM.createRoot(container).render(<App />);
    </script>
  </body>
</html>
