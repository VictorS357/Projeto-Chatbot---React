<!DOCTYPE html>
<html>
  <head>
    <title>React Basics</title>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev@8.6.4/dayjs.js"></script>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">
      function ChatInput() { //O nome do componente sempre deve começar com letra maiúscula (PascalCase)
        return ( //<input /> é um shortcut para <input></input> (apenas para os elementos sem conteúdo dentro)
          <>
            <input placeholder="Send a message to Chatbot" size="30" /> 
            <button>Send</button>
          </>
        ); // '<> </>' é um fragmento. Permite com que retorne um elemento da função sem criar uma div extra
      }

      function ChatMessage({message, sender}) {
        //const message = props.message;
        //const sender = props.sender;
        //const {message} = props;
        //const {sender} = props;

        return (
          <div>
            {sender === 'robot' && (
              <img src="img/robot.png" width="50" />
            )}
            {message}
            {sender === 'user' && (
              <img src="img/user.png" width="50" />
            )}
          </div>
        );
      }

      function App() {
        return (
        <>
          <ChatInput />
          <ChatMessage
            message="hello chatbot"
            sender ="user"
          />
          <ChatMessage
            message="Hello! How can I help you?"
            sender ="robot"
          /> 
          <ChatMessage
            message="can you get me todays date?"
            sender ="user"
          /> 
          <ChatMessage
            message="Today is June 1"
            sender ="robot"
          /> 
        </>
        );
      }


      const container = document.querySelector('.js-container');
      ReactDOM.createRoot(container).render(<App />);
    </script>
  </body>
</html>
