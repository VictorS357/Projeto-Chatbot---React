<!DOCTYPE html>
<html>
  <head>
    <title>React Basics</title>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev@8.6.4/dayjs.js"></script>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">
      function ChatInput() { //O nome do componente sempre deve começar com letra maiúscula (PascalCase)
        return ( //<input /> é um shortcut para <input></input> (apenas para os elementos sem conteúdo dentro)
          <div>
            <input /> 
            <button>Send</button>
          </div>
        );
      }

      const div = ( //Faz a mesma coisa que {ChatInput()} (se chama Component Syntax)
        <div>
          <ChatInput /> 
        </div>
      )


      const container = document.querySelector('.js-container');
      ReactDOM.createRoot(container).render(div);
    </script>
  </body>
</html>
