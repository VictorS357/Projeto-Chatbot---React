<!DOCTYPE html>
<html>
  <head>
    <title>Hooks and Styles Challenge</title>
    <style>
      * {
        font-family: Arial;
      }

      body {
        margin: 0;
      }

      .btn-container {
        display: flex;
        height: 100vh;
        justify-content: center;
        align-items: center;
        background-color: rgb(222, 222, 222);
      }

      button {
        background-color: rgb(25, 135, 84);
        color: white;
        border: none;
        padding: 10px 12px;
        margin-right: 10px;
      }
    </style>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev@8.6.4/dayjs.js"></script>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">
      function CountButtons() {
        const countButtonRef = React.useRef(null);
        const [count, setCount] = React.useState(0);

        function addCount() {
            setCount(count + 1);
        }

        function resetCount() {
            setCount(0);
        }

        function setAutoClick() {
            const buttonElem = countButtonRef.current;
            setInterval(() => {
              buttonElem.click();  
            }, 1000);
        }

        return(
            <div className="btn-container">
                <button ref={countButtonRef} onClick={addCount}>Clicked {count} times</button>
                <button onClick={resetCount}>Reset</button>
                <button onClick={setAutoClick}>Auto Click</button>
            </div>
        );
      }

      function App() {
        return (
          <>
            <CountButtons />
          </>
        );
      }

      const container = document.querySelector('.js-container');
      const root = ReactDOM.createRoot(container);
      root.render(<App />);
    </script>
  </body>
</html>
