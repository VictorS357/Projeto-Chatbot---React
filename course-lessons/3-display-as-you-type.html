<!DOCTYPE html>
<html>
  <head>
    <title>State and Event Handlers</title>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev@8.6.4/dayjs.js"></script>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">
      function DisplayMessage({value}) {
        const [inputText, setInputText] = React.useState(value);
        function displayText(event) {
            setInputText(event.target.value);
        }
        function resetText() {
            setInputText('');
        }
        function exampleText() {
            setInputText(inputText + ' Victor');
        }
        return(
            <>
                <input 
                    type="text"
                    onChange={displayText}
                    value={inputText}
                />
                <button onClick={resetText} >Reset</button>
                <button onClick={exampleText}>Example</button>
                <p>{inputText}</p>
            </>
        );
      }

      function App() {
        return (
          <>
            <DisplayMessage />
          </>
        );
      }

      const container = document.querySelector('.js-container');
      const root = ReactDOM.createRoot(container);
      root.render(<App />);
    </script>
  </body>
</html>
