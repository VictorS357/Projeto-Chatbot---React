<!DOCTYPE html>
<html>
  <head>
    <title>State and Event Handlers</title>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev@8.6.4/dayjs.js"></script>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">
      function ButtonClickOne({count, setCount}) {
        function increaseCount() {
          setCount(count + 1);
        }

        return (
          <>
            <button
              onClick={increaseCount}
            >Clicked {count} {count === 1 ? ('time'):('times')}</button>
          </>
        );
      }

      function ButtonClickTwo({count, setCount}) {
        function increaseCount() {
          setCount(count + 1);
        }

        return (
          <>
            <button
              onClick={increaseCount}
            >Clicked {count} {count === 1 ? ('time'):('times')}</button>
          </>
        );
      }

      function ResetButton({count, setCount}) {
        function resetCount() {
          setCount(0);
        }
        return(
          <button
            onClick={resetCount}
          >Reset</button>
        );
      }

      function App() {
        const [count, setCount] = React.useState(0);
        return (
          <>
            <ButtonClickOne
              count={count}
              setCount={setCount}
            />
            <ButtonClickTwo
              count={count}
              setCount={setCount}
            />
            <ResetButton
              count={count}
              setCount={setCount}
            />
          </>
        );
      }

      const container = document.querySelector('.js-container');
      const root = ReactDOM.createRoot(container);
      root.render(<App />);
    </script>
  </body>
</html>
