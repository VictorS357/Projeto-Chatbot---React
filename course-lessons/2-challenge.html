<!DOCTYPE html>
<html>
  <head>
    <title>Components and props Challenge</title>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev@8.6.4/dayjs.js"></script>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">
      function ProductDetails({product, price, discountPrice, imageSrc}) {
        return (
          <>
            {imageSrc && product === 'cotton-socks' && (
              <img src="img/cotton-socks.png" />
            )}
            {imageSrc && product === 'tennis-balls' && (
              <img src="img/tennis-balls.png" />
            )}
            {imageSrc && product==='plain-t-shirt' && (
              <img src="img/plain-t-shirt.png" />
            )}
            {product === 'cotton-socks' && (
              <p>Cotton socks</p>
            )}
            {product === 'tennis-balls' && (
              <p>Tennis balls</p>
            )}
            {product === 'plain-t-shirt' && (
              <p>Plain T-Shirt</p>
            )}

            {price && !discountPrice ? (
              <p>Price: {price}</p>
            ):(
              <del><p>Price: {price}</p></del>
            )}
            
            {discountPrice && (
              <p>Discount price: ${discountPrice}</p>
            )}
            <button>Add to Cart</button>
          </>
        );
      }

      function App() {
        return (
          <>
            <ProductDetails
              product="cotton-socks"
              price="10.90"
              discountPrice="5.45"
              imageSrc="img/cotton-socks.png"
            />
            <ProductDetails
              product="tennis-balls"
              price="6.00"
              imageSrc="img/tennis-balls.png"
            />
            <ProductDetails
              product="plain-t-shirt"
              price="7.99"
              imageSrc="img/plain-t-shirt.png"
            />
          </>
        );
      }

      const container = document.querySelector('.js-container');
      const root = ReactDOM.createRoot(container);
      root.render(<App />);
    </script>
  </body>
</html>
